name: Build and Push
on: [push]

jobs:
  build-push:
    runs-on: ubuntu-22.04
    container:
      image: quay.io/buildah/stable:latest
    
    env:
      BUILDAH_ISOLATION: chroot
      _BUILDAH_STARTED_IN_USERNS: ""
      
    steps:
      - name: Checkout
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git clone \
            "https://${{ github.actor }}:${{ secrets.FORGEJO_TOKEN }}@$(echo '${{ github.server_url }}' | sed 's|https://||')/${{ github.repository }}.git" \
            "${GITHUB_WORKSPACE}"

      - name: Build and Push
        run: |
          # Replaced 'gitea.server_url' with 'github.server_url' to satisfy schema syntax rules
          DOMAIN=$(echo "${{ github.server_url }}" | sed 's|https\?://||')
          IMAGE="${DOMAIN}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest"

          buildah login -u "${{ github.actor }}" -p "${{ secrets.FORGEJO_TOKEN }}" "${DOMAIN}"
          buildah bud -t "${IMAGE}" .
          buildah push "${IMAGE}"
