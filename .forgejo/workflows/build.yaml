name: Build and Push
on:
  - push
jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      BUILDAH_ISOLATION: chroot
      _BUILDAH_STARTED_IN_USERNS: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Push
        uses: docker://quay.io/buildah/stable:latest
        run: >
          IMAGE="git.hetmer.net/${{ github.repository }}:latest"

          buildah login \
            -u "${{ github.actor }}" \
            -p "${{ secrets.CI_REGISTRY_PUSH }}" \
            git.hetmer.net
          buildah bud \
            --format docker \
            --label "org.opencontainers.image.source=https://git.hetmer.net/${{ github.repository }}" \
            -t "${IMAGE}" .
          buildah push "${IMAGE}"
